<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Card icon -->
  <g transform="translate(70, 70)">
    <!-- Card base -->
    <rect x="0" y="0" width="60" height="40" rx="4" fill="white" opacity="0.95"/>
    
    <!-- Chip -->
    <rect x="8" y="8" width="12" height="12" rx="1" fill="#fbbf24"/>
    
    <!-- Stripe -->
    <rect x="0" y="28" width="60" height="8" fill="#1f2937"/>
    
    <!-- Dots -->
    <circle cx="45" cy="32" r="1.5" fill="white"/>
    <circle cx="50" cy="32" r="1.5" fill="white"/>
    <circle cx="55" cy="32" r="1.5" fill="white"/>
  </g>
  
  <!-- Pulse/intelligence indicator -->
  <g transform="translate(120, 65)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Text would go here in implementation, but SVG text renders poorly at small sizes -->
</svg>